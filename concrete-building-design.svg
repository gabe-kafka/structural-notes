<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 330" width="780" height="330">
  <defs>
    <style><![CDATA[
      .bg    { fill: #FFFFFF; }
      .rule  { stroke: #D4D4D4; stroke-width: 0.5; shape-rendering: crispEdges; fill: none; }
      .cb    { fill: none; stroke: #1A1A1A; stroke-width: 1; shape-rendering: crispEdges; }
      text   { font-family: 'Berkeley Mono', 'JetBrains Mono', 'IBM Plex Mono', 'Courier Prime', ui-monospace, monospace; fill: #1A1A1A; font-variant-numeric: tabular-nums; }
      .title { font-size: 18px; letter-spacing: 0.06em; font-weight: 600; }
      .sect  { font-size: 13px; letter-spacing: 0.04em; font-weight: 600; }
      .item  { font-size: 13px; letter-spacing: 0.02em; }
      .sub   { font-size: 12px; letter-spacing: 0.02em; }
      .th    { font-size: 9px;  letter-spacing: 0.18em; font-weight: 700; }
      .td    { font-size: 12px; letter-spacing: 0.02em; }
      .dim   { fill: #6B6B6B; }
      @media (prefers-color-scheme: dark) {
        .bg   { fill: #0A0A0A; }
        .rule { stroke: #2A2A2A; }
        .cb   { stroke: #E5E5E5; }
        text  { fill: #E5E5E5; }
        .dim  { fill: #808080; }
      }
    ]]></style>
  </defs>

  <rect class="bg" width="780" height="330"/>

  <!-- TITLE -->
  <text x="24" y="42" class="title">Concrete Building Design</text>
  <line x1="24" y1="54" x2="756" y2="54" class="rule"/>

  <!-- SECTION -->
  <text x="24" y="80" class="sect">Foundation Design:</text>

  <!-- ITEM 1 -->
  <rect class="cb" x="40" y="100" width="10" height="10"/>
  <text x="58" y="109" class="item">Lateral System Proof of Concept  —  limits:  Δ <tspan class="dim">(delta)</tspan> &lt; L/400</text>

  <!-- SUB-ITEM 1 -->
  <rect class="cb" x="64" y="126" width="10" height="10"/>
  <text x="82" y="135" class="sub">Governing Load Case:  1.0 × Wind  <tspan class="dim">(25 year = 87 mph)</tspan></text>

  <!-- ITEM 2 -->
  <rect class="cb" x="40" y="160" width="10" height="10"/>
  <text x="58" y="169" class="item">Foundation Prelim Design  —  limits:  qₐ = 2 tsf, 3 tsf, etc.</text>

  <!-- SUB-ITEM 2 -->
  <rect class="cb" x="64" y="186" width="10" height="10"/>
  <text x="82" y="195" class="sub">Governing Load Case:</text>

  <!-- LEFT TABLE: ASD: EQ -->
  <g transform="translate(100,215)">
    <line x1="0" y1="0"  x2="310" y2="0"  class="rule"/>
    <text x="0" y="14" class="th">ASD: EQ</text>
    <line x1="0" y1="20" x2="310" y2="20" class="rule"/>

    <text x="0" y="36" class="td">1.0D + 0.7E</text>
    <line x1="0" y1="42" x2="310" y2="42" class="rule"/>

    <text x="0" y="58" class="td">1.0D + 0.525E + 0.75L</text>
    <line x1="0" y1="64" x2="310" y2="64" class="rule"/>

    <text x="0" y="80" class="td">0.6D + 0.7E</text>
    <line x1="0" y1="86" x2="310" y2="86" class="rule"/>
  </g>

  <!-- RIGHT TABLE: ASD: WIND -->
  <g transform="translate(446,215)">
    <line x1="0" y1="0"  x2="310" y2="0"  class="rule"/>
    <text x="0" y="14" class="th">ASD: WIND  <tspan class="dim">(700 year = 36,500 weeks, 117 mph)</tspan></text>
    <line x1="0" y1="20" x2="310" y2="20" class="rule"/>

    <text x="0" y="36" class="td">1.0D + 0.6W</text>
    <line x1="0" y1="42" x2="310" y2="42" class="rule"/>

    <text x="0" y="58" class="td">1.0D + 0.75L + 0.45W</text>
    <line x1="0" y1="64" x2="310" y2="64" class="rule"/>

    <text x="0" y="80" class="td">0.6D + 0.6W</text>
    <line x1="0" y1="86" x2="310" y2="86" class="rule"/>
  </g>
</svg>
